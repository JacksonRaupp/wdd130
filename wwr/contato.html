<!doctype html>

<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fale Conosco - Rafting Business</title>

  <link rel="stylesheet" href="estilos/rafting.css" />

  <meta name="author" content="Jackson Raupp" />

  <meta name="description" content="Entre em contato conosco para que possamos lhe ajudar." />
</head>

<body>
  <header>
    <img src="imagens/logotipo-rafting.png"
      alt="Arte de uma onda com um azul vivido escrito RAFTING em cima e um remo vermelho ao fundo" />

    <nav>
      <ul>
        <li><a href="index.html">Página Inicial</a></li>

        <li><a href="sobre.html">Sobre Nós</a></li>

        <li><a href="passeios.html">Passeios</a></li>

        <li><a href="contato.html">Fale Conosco</a></li>
      </ul>
    </nav>
  </header>

  <br /><br>

  <main>
    <section id="endereco">
      <h1>Rafting Business Ltda &reg;</h1>

      <address>
        <p>Av. Avenida, 0000, Bairro, Cidade - Estado</p>
        <p>+55 (00) 0 0000-0000 </p>
        <p>info@raftingbusiness.com</p>
      </address>
    </section>

    <section id="conteudo">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d977.5490919308315!2d-59.454768414239474!3d-14.417119134112287!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1spt-BR!2sbr!4v1780939676427!5m2!1spt-BR!2sbr"
        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
      </iframe>

      <form>
        <fieldset id="info-contato">
          <div class="contato">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" placeholder="Digite aqui">
          </div>

          <br><br>

          <div class="contato">
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Digite aqui">
          </div>
        </fieldset>

        <br>

        <fieldset id="proposito">
          <p>Propósito da Mensagem</p>

          <div>
            <label for="duvida-geral">
              <input type="radio" name="proposito" id="duvida-geral">
              Dúvida Geral
            </label>

            <br><br>

            <label for="reserva">
              <input type="radio" name="proposito" id="reserva">
              Pergunta sobre Reserva
            </label>

            <br><br>

            <label for="sugestao">
              <input type="radio" name="proposito" id="sugestao">
              Sugestão
            </label>
          </div>
        </fieldset>

        <br>

        <fieldset id="mensagem">
          <label for="resumo">Mensagem
            <textarea name="resumo" id="resumo" placeholder="Digite aqui"></textarea>
          </label>

          <br><br>

          <label for="inscricao">
            <input type="checkbox" name="inscricao" id="inscricao">
            Por favor, me inscreva na newslatter mensal
          </label>

          <br><br>

          <button type="submit">Entrar em Contato!</button>
        </fieldset>
      </form>
    </section>

    <section id="equipe">
      <h2>Estamos Aqui para Servi-lo</h2>

      <br>

      <div>
        <figure>
          <img src="imagens/colaborador1.png" alt="" width="120" height="120">
          <figcaption>instrutor - Pedro</figcaption>
        </figure>

        <figure>
          <img src="imagens/colaborador2.png" alt="" width="120" height="120">
          <figcaption>instrutor - Thiago</figcaption>
        </figure>

        <figure>
          <img src="imagens/colaborador3.png" alt="" width="120" height="120">
          <figcaption>instrutora - Joana</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <br />

  <footer>
    <p>&copy;2026 - Rafting Business - Jackson Raupp</p>

    <nav class="redes-sociais">
      <a href="https://x.com/">
        <img src="imagens/logo-x.png" alt="Logotipo X" width="40" />
      </a>

      <a href="https://github.com/">
        <img src="imagens/logo-github.png" alt="Logotipo GitHub" width="40" />
      </a>

      <a href="https://br.linkedin.com/">
        <img src="imagens/logo-linkedin.png" alt="Logotipo Linkedin" width="40" />
      </a>
    </nav>
  </footer>
</body>

</html>
