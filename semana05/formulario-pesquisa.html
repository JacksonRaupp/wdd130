<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header></header>

    <main>
      <form action="">
        <fieldset>
          <legend>Informações de Contato</legend>

          <label for="nomecompleto">Nome Completo:</label>
          <input type="text" id="nome-completo" name="nome-completo" required />

          <br /><br />

          <label for="email">Endereço de e-mail:</label>
          <input type="email" name="email" id="email" required />
        </fieldset>

        <br />

        <fieldset>
          <legend>Perguntas</legend>

          <label for="nevegadorfavorito"
            >Qual é o seu navegador favorito?</label
          >
          <select name="navegador" id="navegador">
            <option value="1">Edge</option>
            <option value="2">Chrome</option>
            <option value="3">Firefox</option>
            <option value="3">Safari</option>
            <option value="3">Brave</option>
            <option value="3">Outro</option>
          </select>

          <br /><br />

          <label for="pet">Você tem um bichinho de estimação?</label>
          <input type="checkbox" name="pet" id="pet" />

          <br /><br />

          <label for="feedback">Liste os lugares onde você morou:</label>
          <textarea
            name="feedback"
            id="feedback"
            rows="4"
            placeholder="Cuiabá, Curitíba, Conquista D'Oeste, Piracicaba, São Paulo."
          ></textarea>
        </fieldset>

        <br />

        <button type="submit">Enviar Pesquisa</button>
      </form>
    </main>

    <footer></footer>
  </body>
</html>
