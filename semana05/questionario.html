<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário Web</title>
    <link rel="stylesheet" href="estilos/questionario.css">
</head>

<body>
    <header>
        <h1>Questionário Web</h1>
    </header>

    <hr>
    <br>

    <main>
        <form>
            <fieldset>
                <legend>Perguntas</legend>
                <label for="q1">1. O que significa a sigla CSS?</label>
                <br>
                <input type="text" name="q1" id="q1">

                <br><br>

                <label for="q2">2. Como os atributos 'id' e 'class' são selecionados no CSS?</label>
                <br>
                <textarea name="q2" id="q2"></textarea>

                <br><br>

                <label for="q3">3. Qual das opções abaixo é um comentário CSS válido?</label>
                <br>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Escolha uma...</option>
                    <option value="">&lt;!-- comentário ... --&gt;</option>
                    <option value="">/* comentário */</option>
                    <option value=""># comentário</option>
                    <option value="">""" comentário """</option>
                </select>

                <br><br>

                <label for="q4">
                    4. Qual é a margem inferior dada por esta declaração
                    <br>
                    <pre><code>margin: 10px 5px 15px;</code></pre>
                    <br>
                    <input type="text" name="q4" id="q4">
                </label>

                <br><br>

                <button type="submit">Enviar Questionário</button>
            </fieldset>
        </form>
    </main>

    <br>
    <hr>

    <footer>&copy;2026 | S05 Atividade Guiada de Programação: Formulário de Questionário | Jackson Raupp</footer>
</body>

</html>
